<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Control de Envases — Remito</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3347;
    --blue: #3b82f6;
    --blue-dark: #2563eb;
    --green: #22c55e;
    --green-dark: #16a34a;
    --red: #ef4444;
    --amber: #f59e0b;
    --text: #f1f5f9;
    --muted: #64748b;
    --card-r: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100dvh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-logo {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: var(--blue);
    text-transform: uppercase;
  }
  .header-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
  }

  /* ── SCREENS ── */
  .screen { display: none; padding: 20px; max-width: 480px; margin: 0 auto; }
  .screen.active { display: block; }

  /* ── HOME SCREEN ── */
  .home-greeting {
    text-align: center;
    padding: 32px 0 24px;
  }
  .home-greeting h1 {
    font-size: 26px;
    font-weight: 800;
    color: var(--text);
    line-height: 1.2;
  }
  .home-greeting p {
    font-size: 14px;
    color: var(--muted);
    margin-top: 8px;
  }

  .client-input-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--card-r);
    padding: 16px;
    margin-bottom: 20px;
  }
  .client-input-wrap label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .client-input-wrap input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    color: var(--text);
    font-size: 16px;
    outline: none;
    transition: border-color 0.2s;
  }
  .client-input-wrap input:focus { border-color: var(--blue); }
  .client-input-wrap input::placeholder { color: var(--muted); }

  .action-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 24px;
  }

  .action-btn {
    border: none;
    border-radius: var(--card-r);
    padding: 28px 16px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    font-family: inherit;
    transition: transform 0.15s, opacity 0.15s;
    position: relative;
    overflow: hidden;
  }
  .action-btn:active { transform: scale(0.97); opacity: 0.9; }

  .action-btn.entregados {
    background: linear-gradient(135deg, #1e3a5f 0%, #1e40af 100%);
    border: 1px solid #3b82f6aa;
  }
  .action-btn.recibidos {
    background: linear-gradient(135deg, #14532d 0%, #166534 100%);
    border: 1px solid #22c55eaa;
  }

  .action-btn .icon {
    width: 52px;
    height: 52px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
  }
  .action-btn.entregados .icon { background: rgba(59,130,246,0.25); }
  .action-btn.recibidos .icon { background: rgba(34,197,94,0.25); }

  .action-btn .label {
    font-size: 17px;
    font-weight: 700;
    color: white;
    text-align: center;
  }
  .action-btn .sublabel {
    font-size: 12px;
    color: rgba(255,255,255,0.6);
    text-align: center;
    line-height: 1.3;
  }

  .count-badge {
    position: absolute;
    top: 10px;
    right: 10px;
    background: rgba(255,255,255,0.15);
    border-radius: 20px;
    padding: 2px 8px;
    font-size: 12px;
    font-weight: 700;
    color: white;
  }

  /* ── SUMMARY CARD ── */
  .summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--card-r);
    padding: 16px;
    margin-bottom: 16px;
  }
  .summary-card h3 {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .summary-list { display: flex; flex-direction: column; gap: 6px; }
  .summary-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--surface2);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 14px;
  }
  .summary-item .tube { font-weight: 700; font-family: monospace; font-size: 15px; }
  .summary-item .gas { color: var(--muted); font-size: 13px; }
  .summary-item .del-btn {
    background: none;
    border: none;
    color: var(--red);
    cursor: pointer;
    font-size: 18px;
    padding: 0 4px;
    opacity: 0.6;
    transition: opacity 0.15s;
  }
  .summary-item .del-btn:hover { opacity: 1; }
  .summary-empty {
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    padding: 12px 0;
    font-style: italic;
  }

  /* Generate button */
  .generate-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--blue-dark), var(--blue));
    border: none;
    border-radius: var(--card-r);
    padding: 16px;
    color: white;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: opacity 0.2s, transform 0.15s;
  }
  .generate-btn:active { transform: scale(0.98); }
  .generate-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── SCANNER SCREEN ── */
  .scanner-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }
  .back-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 12px;
    color: var(--text);
    cursor: pointer;
    font-size: 20px;
    font-family: inherit;
  }
  .scanner-title {
    font-size: 20px;
    font-weight: 700;
  }
  .scanner-title.blue { color: var(--blue); }
  .scanner-title.green { color: var(--green); }

  #qr-reader {
    border-radius: 14px;
    overflow: hidden;
    border: 2px solid var(--border);
    margin-bottom: 16px;
    background: black;
    min-height: 280px;
  }
  #qr-reader video { border-radius: 12px; }

  .scan-status {
    text-align: center;
    padding: 12px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 16px;
    transition: all 0.3s;
  }
  .scan-status.waiting { background: var(--surface2); color: var(--muted); }
  .scan-status.success { background: rgba(34,197,94,0.15); color: var(--green); border: 1px solid rgba(34,197,94,0.3); }
  .scan-status.error { background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }
  .scan-status.dupe { background: rgba(245,158,11,0.15); color: var(--amber); border: 1px solid rgba(245,158,11,0.3); }

  .scanned-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 16px;
    max-height: 220px;
    overflow-y: auto;
  }
  .scanned-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    animation: slideIn 0.2s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .scanned-item .num { font-weight: 700; font-family: monospace; font-size: 16px; }
  .scanned-item .info { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .scanned-item .remove { background: none; border: none; color: var(--red); cursor: pointer; font-size: 20px; opacity: 0.6; }

  .done-btn {
    width: 100%;
    padding: 16px;
    border-radius: var(--card-r);
    border: none;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: transform 0.15s, opacity 0.2s;
  }
  .done-btn:active { transform: scale(0.98); }
  .done-btn.blue { background: var(--blue); color: white; }
  .done-btn.green { background: var(--green); color: white; }
  .done-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 20px;
    font-size: 14px;
    font-weight: 600;
    z-index: 999;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    white-space: nowrap;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { color: var(--green); border-color: rgba(34,197,94,0.3); }
  .toast.error { color: var(--red); border-color: rgba(239,68,68,0.3); }
  .toast.info { color: var(--blue); border-color: rgba(59,130,246,0.3); }

  /* ── PDF PREVIEW hidden ── */
  #pdf-template { display: none; }
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">Oxígeno Bs. As.</div>
  <div class="header-title">Remito Digital</div>
</div>

<!-- HOME SCREEN -->
<div class="screen active" id="screen-home">
  <div class="home-greeting">
    <h1>Control de Envases</h1>
    <p>Escaneá los QR de los envases para generar el remito</p>
  </div>

  <div class="client-input-wrap">
    <label>Cliente</label>
    <input type="text" id="client-name" placeholder="Nombre del cliente..." autocomplete="off" />
  </div>

  <div class="action-grid">
    <button class="action-btn entregados" onclick="openScanner('entregados')">
      <div class="icon">📦</div>
      <div class="label">Entregados</div>
      <div class="sublabel">Tubos llenos que dejás</div>
      <div class="count-badge" id="badge-entregados">0</div>
    </button>
    <button class="action-btn recibidos" onclick="openScanner('recibidos')">
      <div class="icon">↩️</div>
      <div class="label">Recibidos</div>
      <div class="sublabel">Tubos vacíos que retirás</div>
      <div class="count-badge" id="badge-recibidos">0</div>
    </button>
  </div>

  <!-- Summary -->
  <div class="summary-card">
    <h3>📦 Tubos Entregados (<span id="count-e">0</span>)</h3>
    <div class="summary-list" id="list-entregados">
      <div class="summary-empty">Sin escanear aún</div>
    </div>
  </div>

  <div class="summary-card">
    <h3>↩️ Tubos Recibidos (<span id="count-r">0</span>)</h3>
    <div class="summary-list" id="list-recibidos">
      <div class="summary-empty">Sin escanear aún</div>
    </div>
  </div>

  <button class="generate-btn" id="gen-btn" onclick="generatePDF()" disabled>
    📄 Generar y compartir remito
  </button>
</div>

<!-- SCANNER SCREEN -->
<div class="screen" id="screen-scanner">
  <div class="scanner-header">
    <button class="back-btn" onclick="closeScanner()">←</button>
    <div>
      <div class="scanner-title" id="scanner-title">Escaneando...</div>
      <div style="font-size:12px;color:var(--muted);margin-top:2px" id="scanner-sub"></div>
    </div>
  </div>

  <div id="qr-reader"></div>

  <div class="scan-status waiting" id="scan-status">
    📷 Apuntá la cámara al código QR del envase
  </div>

  <div class="scanned-list" id="scanned-list"></div>

  <button class="done-btn" id="done-btn" onclick="closeScanner()" disabled>
    Listo — guardar escaneados
  </button>
</div>

<!-- Hidden PDF template -->
<div id="pdf-template"></div>

<div class="toast" id="toast"></div>

<script>
// ── STATE ──────────────────────────────────────────────────────────────────
const state = {
  entregados: [], // [{tube, gas, capacity}]
  recibidos:  [],
  currentMode: null,
  scanner: null,
};

// ── TUBE DATA LOOKUP ───────────────────────────────────────────────────────
// Reads tube info from QR URL params
function parseTubeFromQR(text) {
  try {
    // QR format: https://...?tubo=XXXXXX
    const url = new URL(text);
    const tubo = url.searchParams.get('tubo');
    if (tubo) return { tube: tubo, gas: '', capacity: '' };
  } catch {}
  // Fallback: plain tube number
  if (/^\d+$/.test(text.trim())) return { tube: text.trim(), gas: '', capacity: '' };
  return null;
}

// ── SCANNER ────────────────────────────────────────────────────────────────
function openScanner(mode) {
  state.currentMode = mode;
  document.getElementById('screen-home').classList.remove('active');
  document.getElementById('screen-scanner').classList.add('active');

  const title = document.getElementById('scanner-title');
  const sub   = document.getElementById('scanner-sub');
  const btn   = document.getElementById('done-btn');

  if (mode === 'entregados') {
    title.textContent = '📦 Tubos Entregados';
    title.className = 'scanner-title blue';
    btn.className = 'done-btn blue';
  } else {
    title.textContent = '↩️ Tubos Recibidos';
    title.className = 'scanner-title green';
    btn.className = 'done-btn green';
  }

  // Show current list
  renderScannerList();
  updateDoneBtn();

  // Start camera
  startCamera();
}

function startCamera() {
  const config = {
    fps: 15,
    qrbox: { width: 250, height: 250 },
    aspectRatio: 1.0,
    showTorchButtonIfSupported: true,
  };

  state.scanner = new Html5Qrcode("qr-reader");
  state.scanner.start(
    { facingMode: "environment" },
    config,
    onScanSuccess,
    () => {} // ignore errors
  ).catch(err => {
    setStatus('error', '⚠️ No se pudo acceder a la cámara. Verificá los permisos.');
  });
}

function onScanSuccess(text) {
  const parsed = parseTubeFromQR(text);
  if (!parsed) {
    setStatus('error', '❌ QR no reconocido — usá los QR del sistema');
    setTimeout(() => setStatus('waiting', '📷 Apuntá la cámara al código QR'), 2000);
    return;
  }

  const list = state[state.currentMode];
  if (list.find(i => i.tube === parsed.tube)) {
    setStatus('dupe', `⚠️ Tubo ${parsed.tube} ya escaneado`);
    setTimeout(() => setStatus('waiting', '📷 Apuntá la cámara al código QR'), 2000);
    return;
  }

  // Vibrate on success
  if (navigator.vibrate) navigator.vibrate(100);

  list.push(parsed);
  renderScannerList();
  updateDoneBtn();
  setStatus('success', `✅ Tubo ${parsed.tube} agregado`);
  setTimeout(() => setStatus('waiting', '📷 Apuntá la cámara al código QR'), 1500);
}

function setStatus(type, msg) {
  const el = document.getElementById('scan-status');
  el.className = `scan-status ${type}`;
  el.textContent = msg;
}

function renderScannerList() {
  const list = state[state.currentMode];
  const el = document.getElementById('scanned-list');
  if (list.length === 0) {
    el.innerHTML = '';
    return;
  }
  el.innerHTML = [...list].reverse().map((item, idx) => {
    const realIdx = list.length - 1 - idx;
    return `
      <div class="scanned-item">
        <div>
          <div class="num">${item.tube}</div>
          <div class="info">${item.gas || 'Gas no especificado'}${item.capacity ? ' · ' + item.capacity : ''}</div>
        </div>
        <button class="remove" onclick="removeScanned(${realIdx})">×</button>
      </div>`;
  }).join('');
}

function removeScanned(idx) {
  state[state.currentMode].splice(idx, 1);
  renderScannerList();
  updateDoneBtn();
}

function updateDoneBtn() {
  const count = state[state.currentMode]?.length || 0;
  const btn = document.getElementById('done-btn');
  btn.disabled = count === 0;
  btn.textContent = count === 0
    ? 'Listo — guardar escaneados'
    : `Listo — guardar ${count} envase${count !== 1 ? 's' : ''}`;
}

async function closeScanner() {
  if (state.scanner) {
    try { await state.scanner.stop(); } catch {}
    state.scanner = null;
  }
  document.getElementById('screen-scanner').classList.remove('active');
  document.getElementById('screen-home').classList.add('active');
  renderHome();
}

// ── HOME RENDER ─────────────────────────────────────────────────────────────
function renderHome() {
  renderHomeList('entregados');
  renderHomeList('recibidos');
  document.getElementById('badge-entregados').textContent = state.entregados.length;
  document.getElementById('badge-recibidos').textContent  = state.recibidos.length;
  document.getElementById('count-e').textContent = state.entregados.length;
  document.getElementById('count-r').textContent = state.recibidos.length;

  const hasData = state.entregados.length > 0 || state.recibidos.length > 0;
  const hasClient = document.getElementById('client-name').value.trim().length > 0;
  document.getElementById('gen-btn').disabled = !(hasData && hasClient);
}

function renderHomeList(mode) {
  const list = state[mode];
  const el = document.getElementById(`list-${mode}`);
  if (list.length === 0) {
    el.innerHTML = '<div class="summary-empty">Sin escanear aún</div>';
    return;
  }
  el.innerHTML = list.map((item, idx) => `
    <div class="summary-item">
      <div>
        <span class="tube">${item.tube}</span>
        <span class="gas"> · ${item.gas || '—'}</span>
      </div>
      <button class="del-btn" onclick="deleteFromHome('${mode}', ${idx})">×</button>
    </div>`).join('');
}

function deleteFromHome(mode, idx) {
  state[mode].splice(idx, 1);
  renderHome();
}

document.getElementById('client-name').addEventListener('input', renderHome);

// ── PDF GENERATION ─────────────────────────────────────────────────────────
async function generatePDF() {
  const clientName = document.getElementById('client-name').value.trim();
  if (!clientName) { showToast('Ingresá el nombre del cliente', 'error'); return; }

  showToast('Generando PDF...', 'info');

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });

  const W = 210, H = 297;
  const margin = 12;

  // ── HEADER BOX ──
  doc.setDrawColor(30, 60, 120);
  doc.setLineWidth(0.5);
  doc.rect(margin, 10, W - margin*2, 42);

  // Vertical divider in header
  doc.line(90, 10, 90, 52);
  // Another divider
  doc.line(130, 10, 130, 28);

  // Company name
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(16);
  doc.setTextColor(20, 40, 100);
  doc.text('OXÍGENO BS. AS.', 14, 20);

  doc.setFontSize(8);
  doc.setFont('helvetica', 'normal');
  doc.setTextColor(60, 60, 60);
  doc.text('FERRETERÍA INDUSTRIAL', 14, 26);
  doc.text('de Marcelo F. Vital', 14, 30);
  doc.text('Argon · Atal · Co2 · Nitrógeno · Acetileno · Helio · Oxígeno', 14, 34);
  doc.text('Mig · Tig · Plasma / Reparaciones', 14, 38);
  doc.setFont('helvetica', 'bold');
  doc.text('TALLER PROPIO', 14, 42);
  doc.setFont('helvetica', 'normal');
  doc.text('ALVEAR Nº 2031 (C.P. 1611) DON TORCUATO', 14, 46);
  doc.text('TEL: 4741-6159 / 4748-3275', 14, 50);

  // Top right - title
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(13);
  doc.setTextColor(20, 40, 100);
  doc.text('CONTROL DE ENVASES', 135, 18, { align: 'center' });

  // Date
  const now = new Date();
  const dd = String(now.getDate()).padStart(2,'0');
  const mm = String(now.getMonth()+1).padStart(2,'0');
  const yy = String(now.getFullYear());

  doc.setFont('helvetica', 'normal');
  doc.setFontSize(9);
  doc.setTextColor(60,60,60);
  doc.text(`Fecha: ${dd} / ${mm} / ${yy}`, 135, 30, { align: 'center' });

  // CUIT etc
  doc.setFontSize(7.5);
  doc.text('C.U.I.T.: 20-17996988-3', 135, 38, { align: 'center' });
  doc.text('ING. BRUTOS C.M.: 902-435522-9', 135, 43, { align: 'center' });
  doc.text('INICIO ACTIVIDAD: 01/01/96', 135, 48, { align: 'center' });

  // "No válido como factura" box
  doc.setDrawColor(30,60,120);
  doc.setLineWidth(0.4);
  doc.rect(92, 11, 36, 16);
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(7);
  doc.setTextColor(20,40,100);
  doc.text('DOCUMENTO', 110, 16, { align: 'center' });
  doc.text('NO VÁLIDO', 110, 20, { align: 'center' });
  doc.text('COMO FACTURA', 110, 24, { align: 'center' });

  // ── CLIENT INFO ──
  let y = 56;
  doc.setDrawColor(30,60,120);
  doc.setLineWidth(0.4);
  doc.rect(margin, y, W - margin*2, 28);
  doc.line(90, y, 90, y+28);
  doc.line(90, y+8, W-margin, y+8);
  doc.line(90, y+17, W-margin, y+17);

  doc.setFont('helvetica', 'normal');
  doc.setFontSize(8.5);
  doc.setTextColor(40,40,40);
  doc.text('Señores:', margin+2, y+6);
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(10);
  doc.text(clientName, margin+24, y+6);

  doc.setFont('helvetica', 'normal');
  doc.setFontSize(8.5);
  doc.text('Dirección:', margin+2, y+14);
  doc.text('I.V.A.:', margin+2, y+23);

  doc.text('Cuenta Nº', 92, y+6);
  doc.text('O / Compra Nº:', 92, y+14);
  doc.text('C.U.I.T.:', 92, y+23);

  // ── CONDICIONES ──
  y += 28;
  doc.setDrawColor(30,60,120);
  doc.rect(margin, y, W-margin*2, 8);
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(8);
  doc.setTextColor(40,40,40);
  doc.text('CONDICIONES DE VENTA:', margin+2, y+5.5);
  doc.text('Cont.', margin+52, y+5.5);
  doc.rect(margin+62, y+1.5, 10, 5);
  doc.text('Cta. Cte.', margin+76, y+5.5);
  doc.rect(margin+92, y+1.5, 10, 5);

  // ── MAIN TABLE ──
  y += 8;
  const tableTop = y;
  const colMid = margin + (W - margin*2) / 2 + 2;
  const tableW = W - margin*2;
  const halfW = tableW / 2 - 1;

  // Table border
  doc.setDrawColor(30,60,120);
  doc.setLineWidth(0.4);
  doc.rect(margin, y, tableW, 175);
  doc.line(colMid, y, colMid, y+175);

  // Column headers
  doc.setFillColor(220, 230, 250);
  doc.rect(margin, y, halfW, 8, 'F');
  doc.rect(colMid, y, halfW, 8, 'F');

  doc.setFont('helvetica', 'bold');
  doc.setFontSize(9);
  doc.setTextColor(20,40,100);
  doc.text('TUBOS VACÍOS RECIBIDOS', margin + halfW/2, y+5.5, { align: 'center' });
  doc.text('TUBOS LLENOS ENTREGADOS', colMid + halfW/2, y+5.5, { align: 'center' });

  y += 8;

  // Sub-headers
  const subCols = 3;
  const subW = halfW / subCols;
  const leftCols = ['Nº Tubo', 'Gas', 'Metraje'];
  const rightCols = ['Nº Tubo', 'Gas', 'Metraje'];

  doc.setFillColor(235, 240, 255);
  doc.rect(margin, y, halfW, 6, 'F');
  doc.rect(colMid, y, halfW, 6, 'F');

  doc.setFont('helvetica', 'bold');
  doc.setFontSize(7.5);
  doc.setTextColor(40,40,40);

  leftCols.forEach((h, i) => {
    doc.text(h, margin + i*subW + subW/2, y+4, { align: 'center' });
    if (i < 2) doc.line(margin + (i+1)*subW, y, margin + (i+1)*subW, tableTop+183);
  });
  rightCols.forEach((h, i) => {
    doc.text(h, colMid + i*subW + subW/2, y+4, { align: 'center' });
    if (i < 2) doc.line(colMid + (i+1)*subW, y, colMid + (i+1)*subW, tableTop+183);
  });

  y += 6;

  // Row height
  const rowH = 7;
  const maxRows = Math.floor(160 / rowH);

  doc.setFont('helvetica', 'normal');
  doc.setFontSize(8);
  doc.setTextColor(30,30,30);

  // Draw rows
  for (let i = 0; i < maxRows; i++) {
    const ry = y + i * rowH;
    doc.setDrawColor(200,210,230);
    doc.setLineWidth(0.2);
    doc.line(margin, ry, margin + tableW, ry);

    // Left (recibidos)
    const rec = state.recibidos[i];
    if (rec) {
      doc.setFont('helvetica', 'bold');
      doc.text(String(rec.tube), margin + subW*0 + subW/2, ry+5, { align: 'center', maxWidth: subW-2 });
      doc.setFont('helvetica', 'normal');
      doc.text(rec.gas || '', margin + subW*1 + subW/2, ry+5, { align: 'center', maxWidth: subW-2 });
      doc.text(rec.capacity || '', margin + subW*2 + subW/2, ry+5, { align: 'center', maxWidth: subW-2 });
    }

    // Right (entregados)
    const ent = state.entregados[i];
    if (ent) {
      doc.setFont('helvetica', 'bold');
      doc.text(String(ent.tube), colMid + subW*0 + subW/2, ry+5, { align: 'center', maxWidth: subW-2 });
      doc.setFont('helvetica', 'normal');
      doc.text(ent.gas || '', colMid + subW*1 + subW/2, ry+5, { align: 'center', maxWidth: subW-2 });
      doc.text(ent.capacity || '', colMid + subW*2 + subW/2, ry+5, { align: 'center', maxWidth: subW-2 });
    }
  }

  // ── FOOTER ──
  const footY = tableTop + 183;
  doc.setDrawColor(30,60,120);
  doc.setLineWidth(0.4);
  doc.rect(margin, footY, tableW, 12);
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(8.5);
  doc.setTextColor(40,40,40);
  doc.text('Conforme Cliente:', margin+2, footY+8);

  // Firma
  const sigY = footY + 16;
  doc.setDrawColor(80,80,80);
  doc.setLineWidth(0.3);
  doc.line(margin+20, sigY+18, margin+70, sigY+18);
  doc.line(colMid+10, sigY+18, colMid+60, sigY+18);
  doc.setFontSize(8);
  doc.setTextColor(80,80,80);
  doc.text('FIRMA', margin+45, sigY+22, { align: 'center' });
  doc.text('ACLARACIÓN', colMid+35, sigY+22, { align: 'center' });

  // Imprenta footer
  doc.setFontSize(6);
  doc.setTextColor(120,120,120);
  doc.text('IMPRIMIO: TALLERES GRAFICOS JALIFI S.R.L. 4748-1907  CUIT 30-71411668-8  HAB. MUN. EXP. Nº 4112-2721/03', W/2, H-8, { align: 'center' });

  // ── SHARE ──
  const pdfBlob = doc.output('blob');
  const fileName = `Remito_${clientName.replace(/\s+/g,'_')}_${dd}${mm}${yy}.pdf`;

  try {
    const file = new File([pdfBlob], fileName, { type: 'application/pdf' });
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      await navigator.share({ files: [file], title: `Remito ${clientName}` });
      showToast('¡Remito compartido!', 'success');
    } else {
      // Fallback: download
      const url = URL.createObjectURL(pdfBlob);
      const a = document.createElement('a');
      a.href = url; a.download = fileName; a.click();
      URL.revokeObjectURL(url);
      showToast('PDF descargado', 'success');
    }
  } catch (e) {
    const url = URL.createObjectURL(pdfBlob);
    const a = document.createElement('a');
    a.href = url; a.download = fileName; a.click();
    URL.revokeObjectURL(url);
    showToast('PDF descargado', 'success');
  }
}

// ── TOAST ──────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, type = 'info') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast ${type} show`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = `toast ${type}`; }, 2500);
}

// Init
renderHome();
</script>
</body>
</html>
